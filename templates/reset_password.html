<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);

            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
        }

        h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 6px;

            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;

            background-color: #2196f3;
            color: white;

            border: none;
            border-radius: 6px;

            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1976d2;
        }

        .msg {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

<div class="container">

    <h3>Reset Your Password</h3>

    <!-- Message -->
    {% if msg %}
        <div class="msg error">{{ msg }}</div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input 
            type="text" 
            name="otp" 
            placeholder="Enter OTP" 
            required
        >

        <input 
            type="password" 
            name="new_password" 
            placeholder="New Password" 
            required
        >

        <input 
            type="password" 
            name="confirm_password" 
            placeholder="Confirm Password" 
            required
        >

        <button type="submit">
            Reset Password
        </button>

    </form>

</div>

</body>
</html>
