{% extends 'user_home.html' %}

{% block body %}

<style>
    /* Sky Blue Color Theme */
    :root {
        --sky-blue-light: #87CEEB;
        --sky-blue: #7EC8E3;
        --sky-blue-medium: #4DA8DA;
        --sky-blue-dark: #0077BE;
        --sky-blue-darker: #005A8C;
        --sky-blue-gradient: linear-gradient(135deg, #87CEEB 0%, #4DA8DA 50%, #0077BE 100%);
        --white: #FFFFFF;
        --light-gray: #F8F9FA;
        --shadow: rgba(0, 119, 190, 0.15);
    }

    body {
        background: var(--sky-blue-gradient);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .upload-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .upload-card {
        background: var(--white);
        border-radius: 25px;
        box-shadow: 0 25px 60px var(--shadow);
        overflow: hidden;
        margin-bottom: 40px;
    }

    .upload-header {
        background: var(--sky-blue-gradient);
        padding: 40px;
        text-align: center;
        color: var(--white);
        position: relative;
        overflow: hidden;
    }

    .upload-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%230077BE' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
        opacity: 0.1;
    }

    .upload-icon {
        font-size: 4rem;
        margin-bottom: 20px;
        color: var(--white);
        background: rgba(255, 255, 255, 0.2);
        width: 100px;
        height: 100px;
        line-height: 100px;
        border-radius: 50%;
        margin: 0 auto 25px;
    }

    .upload-title {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 15px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .upload-subtitle {
        font-size: 1.1rem;
        opacity: 0.9;
        max-width: 600px;
        margin: 0 auto;
    }

    .upload-body {
        padding: 50px;
    }

    /* Alert Messages */
    .alert-message {
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
        animation: slideIn 0.5s ease;
    }

    .alert-success {
        background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
        border-left: 5px solid #28a745;
        color: #155724;
    }

    .alert-danger {
        background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
        border-left: 5px solid #dc3545;
        color: #721c24;
    }

    .alert-icon {
        font-size: 1.5rem;
    }

    @keyframes slideIn {
        from {
            transform: translateY(-20px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    /* Form Styles */
    .upload-form {
        max-width: 800px;
        margin: 0 auto;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        margin-bottom: 25px;
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }
    }

    .form-group {
        position: relative;
    }

    .form-label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        color: var(--sky-blue-darker);
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form-label i {
        color: var(--sky-blue-medium);
    }

    .form-control {
        width: 100%;
        padding: 16px 20px;
        border: 2px solid #E0F4FF;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: var(--light-gray);
        color: var(--sky-blue-darker);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--sky-blue-medium);
        box-shadow: 0 0 0 3px rgba(77, 168, 218, 0.2);
        background: var(--white);
    }

    .form-control::placeholder {
        color: #90C6E0;
    }

    /* File Upload Custom Style */
    .file-upload-container {
        position: relative;
        margin: 30px 0 40px;
    }

    .file-upload-label {
        display: block;
        padding: 25px;
        background: linear-gradient(135deg, #E0F4FF 0%, #F0F9FF 100%);
        border: 2px dashed var(--sky-blue);
        border-radius: 15px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .file-upload-label:hover {
        border-color: var(--sky-blue-medium);
        background: linear-gradient(135deg, #F0F9FF 0%, #E0F4FF 100%);
        transform: translateY(-2px);
    }

    .file-upload-icon {
        font-size: 3rem;
        color: var(--sky-blue);
        margin-bottom: 15px;
    }

    .file-upload-text {
        color: var(--sky-blue-darker);
        font-weight: 600;
        margin-bottom: 10px;
    }

    .file-upload-hint {
        color: #90C6E0;
        font-size: 0.9rem;
    }

    #file {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
    }

    /* Submit Button */
    .submit-btn {
        display: block;
        width: 100%;
        padding: 18px;
        background: var(--sky-blue-gradient);
        color: var(--white);
        border: none;
        border-radius: 12px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 119, 190, 0.3);
    }

    .submit-btn:active {
        transform: translateY(-1px);
    }

    .submit-btn i {
        margin-right: 10px;
        font-size: 1.3rem;
    }

    /* Progress Animation */
    .submit-btn::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
    }

    .submit-btn:hover::after {
        left: 100%;
    }

    /* Cloud Animation */
    .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        animation: float 20s infinite linear;
    }

    .cloud-1 {
        width: 80px;
        height: 30px;
        top: 20%;
        left: 10%;
        animation-delay: 0s;
    }

    .cloud-2 {
        width: 60px;
        height: 20px;
        top: 40%;
        right: 15%;
        animation-delay: -5s;
        animation-duration: 15s;
    }

    .cloud-3 {
        width: 100px;
        height: 40px;
        top: 70%;
        left: 5%;
        animation-delay: -10s;
        animation-duration: 25s;
    }

    @keyframes float {
        0% {
            transform: translateX(0) translateY(0);
        }
        25% {
            transform: translateX(20px) translateY(-10px);
        }
        50% {
            transform: translateX(40px) translateY(0);
        }
        75% {
            transform: translateX(20px) translateY(10px);
        }
        100% {
            transform: translateX(0) translateY(0);
        }
    }
</style>

<div class="upload-container">
    <div class="upload-card">
        <div class="upload-header">
            <!-- Floating Clouds -->
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
            
            <div class="upload-icon">
                <i class="fas fa-cloud-upload-alt"></i>
            </div>
            <h1 class="upload-title">Upload Files</h1>
            <p class="upload-subtitle">Securely upload your evidence files with detailed information. All files are encrypted and stored safely.</p>
        </div>
        
        <div class="upload-body">
            <!-- Alert Messages -->
            {% if msg %}
            <div class="alert-message alert-success">
                <i class="fas fa-check-circle alert-icon"></i>
                <div>
                    <strong>Success!</strong> {{ msg }}
                </div>
            </div>
            {% endif %}
            
            {% if error %}
            <div class="alert-message alert-danger">
                <i class="fas fa-exclamation-triangle alert-icon"></i>
                <div>
                    <strong>Error!</strong> {{ error }}
                </div>
            </div>
            {% endif %}
            
            <!-- Upload Form -->
            <form method="post" action="{% url 'Upload_Files' %}" enctype="multipart/form-data" class="upload-form">
                {% csrf_token %}
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="case_number" class="form-label">
                            <i class="fas fa-folder"></i>
                            Case Number
                        </label>
                        <input type="text" name="case_number" id="case_number" 
                               class="form-control" placeholder="Enter Case Number" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="filename" class="form-label">
                            <i class="fas fa-file-alt"></i>
                            File Name
                        </label>
                        <input type="text" name="filename" id="filename" 
                               class="form-control" placeholder="Enter file name" required>
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="evidence_type" class="form-label">
                            <i class="fas fa-tags"></i>
                            Evidence Type
                        </label>
                        <input type="text" name="evidence_type" id="evidence_type" 
                               class="form-control" placeholder="Enter evidence type" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="evidence_description" class="form-label">
                            <i class="fas fa-align-left"></i>
                            Description
                        </label>
                        <input type="text" name="evidence_description" id="evidence_description" 
                               class="form-control" placeholder="Enter detailed description" required>
                    </div>
                </div>
                
                <!-- File Upload Area -->
                <div class="file-upload-container">
                    <label for="file" class="file-upload-label">
                        <div class="file-upload-icon">
                            <i class="fas fa-file-upload"></i>
                        </div>
                        <div class="file-upload-text">Choose a file to upload</div>
                        <div class="file-upload-hint">Click to browse or drag and drop your file here</div>
                    </label>
                    <input type="file" class="form-control" name="file" id="file" required>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-upload"></i>
                    Upload File
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

{% endblock %}
